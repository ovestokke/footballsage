services:
  worldcup-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: worldcup
    ports:
      - "${WORLDCUP_DB_PORT:-5432}:5432"
    volumes:
      - worldcup-pgdata:/var/lib/postgresql/data
      - ./services/worldcup/db/dump:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  worldcup-api:
    image: node:24-alpine
    working_dir: /app/services/worldcup
    command: sh -c "corepack enable && pnpm install --ignore-workspace && pnpm dev"
    environment:
      CI: "true"
      DATABASE_URL: postgres://postgres:dev@worldcup-postgres:5432/worldcup
      FOOTBALL_DATA_TOKEN: dev-placeholder
      LIVE_SYNC_ENABLED: "true"
      LIVE_SYNC_CRON: "*/30 * * * * *"
      LINEUPS_SYNC_ENABLED: "false"
      OFFICIALS_SYNC_ENABLED: "false"
      PUSH_ENABLED: "false"
      PORT: "3001"
    ports:
      - "${WORLDCUP_API_PORT:-3001}:3001"
    volumes:
      - .:/app
      - /app/services/worldcup/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - worldcup-postgres
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      API_RELOAD: "1"
      WORLDCUP_API_URL: http://worldcup-api:3001/v1
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./apps/api:/app/apps/api
    depends_on:
      - worldcup-api
    restart: unless-stopped

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @footballsage/web dev --hostname 0.0.0.0 --port 3000"
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: /api
      CI: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pnpm-store:
  worldcup-pgdata:
