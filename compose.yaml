services:
  api:
    image: ghcr.io/ovestokke/footballsage-api:latest
    env_file:
      - .env
    volumes:
      # Persist saved teams only. Static price/mapping data is baked into the image.
      # Mounting ./data over /app/data would hide required CSV files in the image.
      - ./data/teams:/app/data/teams
    expose:
      - "8000"
    restart: unless-stopped

  web:
    image: ghcr.io/ovestokke/footballsage-web:latest
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
